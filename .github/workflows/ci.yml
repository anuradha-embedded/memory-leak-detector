name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  linux:
    name: Ubuntu (cmake + ctest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Run demo
        run: ./build/memleak_demo || true

  linux-make:
    name: Ubuntu (plain Makefile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test with make
        run: |
          make CXX=g++
          make CXX=g++ test

  macos:
    name: macOS (cmake + ctest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Run demo
        run: ./build/memleak_demo || true
